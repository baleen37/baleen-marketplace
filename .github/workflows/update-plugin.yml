name: Update Plugin Version

on:
  repository_dispatch:
    types: [update-plugin]
  workflow_dispatch:
    inputs:
      plugin:
        description: 'Plugin name'
        required: true
      version:
        description: 'Version'
        required: true

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update version
        env:
          PLUGIN: ${{ github.event.client_payload.plugin || inputs.plugin }}
          VERSION: ${{ github.event.client_payload.version || inputs.version }}
        run: |
          # Validate environment variables
          if [ -z "$PLUGIN" ] || [ -z "$VERSION" ]; then
            echo "::error::PLUGIN and VERSION must be provided"
            exit 1
          fi

          # Check if plugin exists
          if ! jq -e --arg name "$PLUGIN" '.plugins[] | select(.name == $name)' .claude-plugin/marketplace.json > /dev/null; then
            echo "::error::Plugin '$PLUGIN' not found in marketplace.json"
            exit 1
          fi

          jq --arg name "$PLUGIN" --arg v "$VERSION" \
            '(.plugins[] | select(.name == $name) | .version) |= $v' \
            .claude-plugin/marketplace.json > tmp.json && mv tmp.json .claude-plugin/marketplace.json

      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .claude-plugin/marketplace.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore: update ${{ github.event.client_payload.plugin || inputs.plugin }} to ${{ github.event.client_payload.version || inputs.version }}"
          git push
